<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبك | 2M</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#121212] text-white p-6">

    <div class="max-w-2xl mx-auto">

        <h1 class="text-3xl font-black mb-8 text-blue-500 text-center">
            قائمة طلباتك 🎮
        </h1>

        <div class="bg-neutral-900 rounded-2xl p-6 mb-6 border border-neutral-800 shadow-2xl">

            <label class="block mb-2 font-bold text-neutral-400">
                اسمك الثنائي:
            </label>
            <input
                type="text"
                id="user-name"
                class="w-full p-4 rounded-xl bg-black border border-neutral-700 text-white mb-4 outline-none focus:border-blue-500 transition"
                placeholder="اكتب اسمك هنا..."
            >

            <label class="block mb-2 font-bold text-neutral-400">
                اختر الفرع:
            </label>
            <select
                id="branch"
                class="w-full p-4 rounded-xl bg-black border border-neutral-700 text-white mb-6 outline-none focus:border-blue-500 transition"
            >
                <option value="الهانوفيل">الهانوفيل 🔴</option>
                <option value="البيطاش">البيطاش 🔵</option>
            </select>

            <h2 class="text-xl font-bold mb-4 border-b border-neutral-800 pb-2 text-neutral-300">
                الألعاب المختارة:
            </h2>
            <ul id="cart-list" class="space-y-3 mb-8 max-h-[300px] overflow-y-auto pr-1"></ul>

            <div
                class="text-2xl font-black text-emerald-400 text-center mb-6 py-2 bg-emerald-950/20 rounded-xl border border-emerald-900/40"
                id="total-price"
            ></div>

            <button
                id="sendOrderBtn"
                class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black text-xl shadow-lg transition duration-200 flex justify-center items-center gap-2"
            >
                إرسال الطلب عبر واتساب ✅
            </button>

        </div>

        <a
            href="index.html"
            class="block text-center text-neutral-500 hover:text-white transition font-semibold"
        >
            ← العودة لإضافة المزيد
        </a>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBE2-qaGOOlmhn9QA01J5wizJ_CcMMh7qE",
          authDomain: "ifix-store-eecd9.firebaseapp.com",
          projectId: "ifix-store-eecd9",
          storageBucket: "ifix-store-eecd9.firebasestorage.app",
          messagingSenderId: "862863699996",
          appId: "1:862863699996:web:7af653f4de7d0baa0fafd9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // جلب السلة (المصفوفة العادية المسجلة بموقعك)
        let cart = JSON.parse(localStorage.getItem('ifix_cart')) || [];
        const pricePerGame = 25;
        let currentUserEmail = "لا يوجد بريد الكتروني (زائر)";

        // مراقبة تسجيل الدخول لوضع اسم الإيميل في الطلب والاسم تلقائياً بالخانة
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserEmail = user.email;
                if(!document.getElementById('user-name').value) {
                    document.getElementById('user-name').value = user.displayName || "";
                }
            }
        });

        // دالة عرض الألعاب في السلة المتوافقة تماماً مع بيانات موقعك الحالية
        function renderCart() {
            const list = document.getElementById('cart-list');

            if (cart.length === 0) {
                list.innerHTML = `<li class="text-center text-neutral-500 py-4">السلة فاضية.. ارجع اختار ألعابك 🛒</li>`;
                document.getElementById('total-price').innerText = "";
                return;
            }

            // عرض العناصر كنصوص عادية كما هي مخزنة في الـ LocalStorage الخاص بك
            list.innerHTML = cart.map((item, index) => `
                <li class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-neutral-800 hover:border-neutral-700 transition">
                    <span class="font-bold text-sm text-neutral-200">${item}</span>
                    <button
                        data-index="${index}"
                        class="remove-game-btn bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white transition w-8 h-8 flex items-center justify-center rounded-lg text-xs"
                    >
                        🗑️
                    </button>
                </li>
            `).join('');

            document.getElementById('total-price').innerText = `الإجمالي: ${cart.length * pricePerGame} ج.م`;

            // تفعيل أزرار الحذف بداخل السكريبت
            document.querySelectorAll('.remove-game-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.currentTarget.getAttribute('data-index'));
                    cart.splice(idx, 1);
                    localStorage.setItem('ifix_cart', JSON.stringify(cart));
                    renderCart();
                });
            });
        }

        // تشغيل عرض السلة فوراً
        renderCart();

        // حدث إرسال الطلب وحفظه بالفايربيس والواتساب معاً
        document.getElementById("sendOrderBtn").addEventListener("click", () => {
            const name = document.getElementById('user-name').value.trim();
            const branch = document.getElementById('branch').value;
            const totalPrice = cart.length * pricePerGame;

            if (!name) {
                alert('من فضلك اكتب اسمك الثنائي أولاً 📝');
                return;
            }

            if (cart.length === 0) {
                alert('السلة فاضية تماماً! يرجى إضافة ألعاب أولاً.');
                return;
            }

            // 1. تشكيل رسالة الواتساب المطابقة لصيغتك القديمة الناجحة والمنسقة بالرقم الصحيح
            let message = `السلام عليكم، أنا ${name}\nالفرع: فرع ${branch}\n\n`;
            message += `دي قائمة الألعاب اللي محتاج أنزلها على الهارد:\n\n`;

            cart.forEach((game, index) => {
                message += `${index + 1}. ${game}\n`;
            });

            message += `\nعدد الألعاب: ${cart.length}\n`;
            message += `الإجمالي: ${totalPrice} ج.م`;

            const encodedMsg = encodeURIComponent(message);
            const storePhoneNumber = "201281398314"; // رقمك الأخير الصحيح والمفعل
            const whatsappUrl = `https://wa.me/${storePhoneNumber}?text=${encodedMsg}`;

            // 2. رفع الطلب في الفايربيس (في الخلفية بدون تعطيل لسرعة التوجيه للواتساب)
            addDoc(collection(db, "orders"), {
                userName: name,
                userEmail: currentUserEmail,
                branch: branch,
                games: cart, // مصفوفة أسماء الألعاب كما هي
                totalPrice: totalPrice,
                status: "pending", // الحالة الافتراضية لعرضها في البروفايل
                createdAt: new Date()
            }).then(() => {
                console.log("تم تسجيل الطلب في قاعدة البيانات بنجاح!");
            }).catch((err) => {
                console.error("خطأ صامت في الخلفية أثناء الرفع:", err);
            });

            // 3. تفريغ السلة والتوجيه الفوري المباشر للواتساب
            localStorage.removeItem('ifix_cart');
            window.location.href = whatsappUrl;
        });
    </script>

</body>
</html>
