<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبك | iFix Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white p-6">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-black mb-8 text-blue-500 text-center">قائمة طلباتك 🎮</h1>
        
        <div class="bg-neutral-900 rounded-2xl p-6 mb-6 border border-neutral-800">
            <label class="block mb-2 font-bold text-neutral-400">اسمك الثنائي:</label>
            <input type="text" id="user-name" class="w-full p-4 rounded-xl bg-black border border-neutral-700 text-white mb-6" placeholder="اكتب اسمك هنا...">
            
            <h2 class="text-xl font-bold mb-4 border-b border-neutral-800 pb-2">الألعاب المختارة:</h2>
            <ul id="cart-list" class="space-y-3 mb-8"></ul>
            
            <div class="text-2xl font-bold text-emerald-400 text-center mb-6" id="total-price"></div>
            
            <button onclick="sendWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black text-xl shadow-lg transition">
                إرسال الطلب عبر واتساب ✅
            </button>
        </div>
        
        <a href="index.html" class="block text-center text-neutral-500 hover:text-white">← العودة لإضافة المزيد</a>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('ifix_cart')) || [];
        const pricePerGame = 25; // السعر الموحد

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) {
                list.innerHTML = "<li>السلة فاضية</li>";
                return;
            }
            list.innerHTML = cart.map(item => `<li class="flex justify-between bg-black/40 p-3 rounded-lg border border-neutral-800"><span>${item}</span></li>`).join('');
            document.getElementById('total-price').innerText = `الإجمالي: ${cart.length * pricePerGame} ج.م`;
        }

        function sendWhatsApp() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert('من فضلك اكتب اسمك الأول');
            
            let message = `السلام عليكم، أنا ${name}.. دي قائمة الألعاب اللي محتاج أنزلها على الهارد:\n\n`;
            cart.forEach((game, index) => {
                message += `${index + 1}. ${game}\n`;
            });
            message += `\nعدد الألعاب: ${cart.length}\nالإجمالي: ${cart.length * pricePerGame} ج.م`;
            
            const encodedMsg = encodeURIComponent(message);
            window.location.href = `https://wa.me/201000000000?text=${encodedMsg}`; // حط رقمك هنا مكان الأصفار
        }

        renderCart();
    </script>
</body>
</html>
