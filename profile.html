<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>I Fix Store | الملف الشخصي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<style type="text/css" media="all">
:root {
    --bg: #121212;
    --card: #1c1c1c;
    --border: #2f2f2f;
    --text: #ffffff;
    --muted: #9ca3af;
    --ps-blue: #0070d1;
    --danger: #ef4444;
    --success: #1ea362;
    --warning: #fbbc05;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
}

.profile-container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
    box-sizing: border-box;
}

.profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 25px;
    padding: 30px;
    text-align: center;
}

.profile-photo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--ps-blue);
    margin-bottom: 15px;
}

.profile-card h2 {
    margin: 0 0 10px 0;
    font-weight: 800;
}

.profile-card p {
    color: var(--muted);
    margin: 0;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
}

.stat-card span {
    font-size: 2rem;
    display: block;
    margin-bottom: 5px;
}

.stat-card h3 {
    margin: 5px 0;
    font-size: 1.5rem;
    font-weight: 800;
}

.stat-card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
}

/* ستايل قسم الطلبات الجديد */
.orders-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 25px;
    padding: 25px;
    margin-top: 25px;
}

.orders-section h2 {
    margin: 0 0 20px 0;
    font-size: 1.3rem;
    font-weight: 900;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
}

.order-item {
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.order-info h3 {
    margin: 0 0 5px 0;
    font-size: 1rem;
    font-weight: 700;
}

.order-info p {
    margin: 0;
    font-size: 0.8rem;
    color: var(--muted);
}

.order-status {
    font-size: 0.9rem;
    font-weight: 800;
    padding: 6px 12px;
    border-radius: 10px;
}

.status-pending {
    color: var(--warning);
    background: rgba(251, 188, 5, 0.1);
}

.status-completed {
    color: var(--success);
    background: rgba(30, 163, 98, 0.1);
}

.logout-btn {
    width: 100%;
    margin-top: 25px;
    height: 55px;
    border: none;
    border-radius: 15px;
    background: var(--danger);
    color: #fff;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
} 

.logout-btn:hover {
    transform: scale(0.98);
    opacity: 0.9;
}

.back-link {
    display: block;
    text-align: center;
    color: var(--muted);
    text-decoration: none;
    margin-top: 20px;
    font-size: 0.9rem;
    font-weight: 600;
}
.back-link:hover { color: #fff; }
</style>
<body>
<div class="profile-container">

    <div class="profile-card">
        <div id="photoContainer" style="display: flex; justify-content: center; margin-bottom: 15px;">
            <img id="userPhoto" src="" class="profile-photo" alt="User Photo" referrerpolicy="no-referrer" style="display:none;">
            <div id="userLetterAvatar" class="profile-photo" style="display:none; align-items:center; justify-content:center; font-size:3rem; font-weight:900; color:white; background:#0070d1; line-height: 0;"></div>
        </div>
        
        <h2 id="userDisplayName">جاري التحميل...</h2>
        <p id="userEmail">...</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span>❤️</span>
            <h3 id="favCount">0</h3>
            <p>المفضلة</p>
        </div>

        <div class="stat-card">
            <span>🛒</span>
            <h3 id="cartCountProfile">0</h3>
            <p>السلة</p>
        </div>
    </div>

    <div class="orders-section">
        <h2>📦 طلباتي</h2>
        <div id="orders-list">
            <p style="text-center; color: var(--muted); font-size: 0.9rem; margin:0;">جاري تحميل طلباتك... 🔄</p>
        </div>
    </div>

    <button id="logoutBtn" class="logout-btn">
        🚪 تسجيل الخروج
    </button>

    <a href="index.html" class="back-link">← العودة للمتجر الأساسي</a>

</div>

<script type="module" charset="utf-8">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBE2-qaGOOlmhn9QA01J5wizJ_CcMMh7qE",
  authDomain: "ifix-store-eecd9.firebaseapp.com",
  projectId: "ifix-store-eecd9",
  storageBucket: "ifix-store-eecd9.firebasestorage.app",
  messagingSenderId: "862863699996",
  appId: "1:862863699996:web:7af653f4de7d0baa0fafd9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

    if(!user){
        window.location.href = "index.html";
        return;
    }

    const photoEl = document.getElementById("userPhoto");
    const letterEl = document.getElementById("userLetterAvatar");
    const nameEl = document.getElementById("userDisplayName");
    const emailEl = document.getElementById("userEmail");

    const displayName = user.displayName || "مستخدم iFix Store";
    nameEl.innerText = displayName;
    emailEl.innerText = user.email;

    function showFallbackAvatar() {
        const firstLetter = displayName.trim().charAt(0).toUpperCase();
        letterEl.innerText = firstLetter;
        const colors = ['#0070d1', '#1ea362', '#ea4335', '#fbbc05', '#8e44ad', '#2c3e50', '#d35400'];
        const colorIndex = firstLetter.charCodeAt(0) % colors.length;
        letterEl.style.background = colors[colorIndex];
        letterEl.style.display = "flex";
        photoEl.style.display = "none";
    }

    if (user.photoURL) {
        let cleanUrl = user.photoURL.replace("http://", "https://");
        if (cleanUrl.includes("googleusercontent.com")) {
            cleanUrl = cleanUrl.replace(/=s\d+-c/, "=s0");
        }
        photoEl.src = cleanUrl;
        photoEl.style.display = "block";
        letterEl.style.display = "none";
        photoEl.onerror = function() { showFallbackAvatar(); };
    } else {
        showFallbackAvatar();
    }

    // 1. جلب المفضلة
    try {
        const favSnap = await getDoc(doc(db, "favorites", user.uid));
        let favCount = 0;
        if(favSnap.exists()){
            favCount = (favSnap.data().games || []).length;
        }
        document.getElementById("favCount").innerText = favCount;
    } catch (error) {
        console.error("خطأ بالمفضلة:", error);
    }

    // 2. جلب السلة
    const cart = JSON.parse(localStorage.getItem('ifix_cart')) || [];
    document.getElementById("cartCountProfile").innerText = cart.length;

    // 3. 🔍 جلب وفلترة الطلبات الخاصة بالعميل من الفايربيس عرضها ديناميكياً
    try {
        const ordersListEl = document.getElementById("orders-list");
        
        // استعلام لجلب الطلبات اللي فيها الـ userEmail يساوي إيميل المستخدم الحالي، مرتبة بالأحدث
        const q = query(
            collection(db, "orders"), 
            where("userEmail", "==", user.email),
            orderBy("createdAt", "desc")
        );
        
        const querySnapshot = await getDocs(q);
        
        if (querySnapshot.empty) {
            ordersListEl.innerHTML = `<p style="text-align:center; color:var(--muted); font-size:0.9rem; margin:0;">لم تقم بأي طلبات حتى الآن 🎮</p>`;
        } else {
            let htmlContent = "";
            let orderNumber = querySnapshot.size; // عدد الطلبات الكلي للعد التنازلي

            querySnapshot.forEach((docSnap) => {
                const orderData = docSnap.data();
                
                // تحديد حالة الطلب (إذا لم تكن محددة بالفايربيس نعتبرها قيد الانتظار)
                const status = orderData.status || "pending"; 
                
                let statusText = "⏳ قيد الانتظار";
                let statusClass = "status-pending";

                if (status === "completed" || status === "تم التنفيذ") {
                    statusText = "✅ تم التنفيذ";
                    statusClass = "status-completed";
                }

                // حساب عدد ألعاب هذا الطلب
                const gamesCount = (orderData.games || []).length;

                htmlContent += `
                    <div class="order-item">
                        <div class="order-info">
                            <h3>طلب #${orderNumber}</h3>
                            <p>عدد الألعاب: ${gamesCount} | الإجمالي: ${orderData.totalPrice || 0} ج.م</p>
                        </div>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                `;
                orderNumber--;
            });

            ordersListEl.innerHTML = htmlContent;
        }

    } catch (error) {
        console.error("حدث خطأ أثناء جلب الطلبات:", error);
        // في حال عدم عمل الـ Index الخاص بالترتيب نضع كود احتياطي بدون ترتيب
        try {
            const ordersListEl = document.getElementById("orders-list");
            const qSimple = query(collection(db, "orders"), where("userEmail", "==", user.email));
            const snapSimple = await getDocs(qSimple);
            if(snapSimple.empty) {
                ordersListEl.innerHTML = `<p style="text-align:center; color:var(--muted); font-size:0.9rem; margin:0;">لم تقم بأي طلبات حتى الآن 🎮</p>`;
            } else {
                let htmlContent = ""; let count = 1;
                snapSimple.forEach(d => {
                    const data = d.data();
                    const st = data.status === "completed" ? "✅ تم التنفيذ" : "⏳ قيد الانتظار";
                    const cl = data.status === "completed" ? "status-completed" : "status-pending";
                    htmlContent += `<div class="order-item"><div class="order-info"><h3>طلب #${count}</h3><p>عدد الألعاب: ${(data.games||[]).length} | الإجمالي: ${data.totalPrice||0} ج.م</p></div><span class="order-status ${cl}">${st}</span></div>`;
                    count++;
                });
                ordersListEl.innerHTML = htmlContent;
            }
        } catch(e) {
            document.getElementById("orders-list").innerHTML = `<p style="color:var(--danger); font-size:0.8rem;">خطأ في جلب الطلبات.</p>`;
        }
    }
});

document.getElementById("logoutBtn").addEventListener("click", async()=>{
    try {
        await signOut(auth);
        localStorage.removeItem("ifix_cart");
        window.location.href = "index.html";
    } catch (error) { console.error(error); }
});
</script>
</body>

</html>
