<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>
<style type="text/css" media="all">
body{
    background:#121212;
    color:white;
    font-family:'Inter',sans-serif;
    margin:0;
}
  .profile-container{
    max-width:600px;
    margin:40px auto;
    padding:20px;
}

.profile-card{
    background:#1c1c1c;
    border:1px solid #2f2f2f;
    border-radius:25px;
    padding:30px;
    text-align:center;
}

.profile-photo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0070d1;
    margin-bottom:15px;
}

.profile-card h2{
    margin-bottom:10px;
}

.profile-card p{
    color:#9ca3af;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:20px;
}

.stat-card{
    background:#1c1c1c;
    border:1px solid #2f2f2f;
    border-radius:20px;
    padding:20px;
    text-align:center;
}

.stat-card span{
    font-size:2rem;
}

.logout-btn{
    width:100%;
    margin-top:25px;
    height:55px;
    border:none;
    border-radius:15px;
    background:#ef4444;
    color:#fff;
    font-weight:800;
    cursor:pointer;
} 
</style>
<body>
<div class="profile-container">

    <div class="profile-card">

        <img id="userPhoto" class="profile-photo">

        <h2 id="userDisplayName">...</h2>

        <p id="userEmail">...</p>

    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <span>❤️</span>
            <h3 id="favCount">0</h3>
            <p>المفضلة</p>
        </div>

        <div class="stat-card">
            <span>🛒</span>
            <h3 id="cartCountProfile">0</h3>
            <p>السلة</p>
        </div>

    </div>

    <button id="logoutBtn" class="logout-btn">
        🚪 تسجيل الخروج
    </button>

</div>

<script type="module" charset="utf-8">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const auth = getAuth();
const db = getFirestore();

onAuthStateChanged(auth, async(user)=>{

    if(!user){
        window.location.href = "index.html";
        return;
    }

    document.getElementById("userPhoto").src = user.photoURL;
    document.getElementById("userDisplayName").innerText = user.displayName;
    document.getElementById("userEmail").innerText = user.email;

    const favSnap = await getDoc(
        doc(db,"favorites",user.uid)
    );

    let favCount = 0;

    if(favSnap.exists()){
        favCount = (favSnap.data().games || []).length;
    }

    document.getElementById("favCount").innerText = favCount;

    const cart =
      JSON.parse(localStorage.getItem("ifix_cart")) || [];

    document.getElementById("cartCountProfile").innerText =
      cart.length;
});

document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

    await signOut(auth);

    localStorage.removeItem("ifix_cart");

    window.location.href = "index.html";
});
</script>
</body>

</html>
